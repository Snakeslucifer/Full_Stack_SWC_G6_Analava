<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
    }

    input {
      padding: 10px;
      width: 70%;
    }

    button {
      padding: 8px 12px;
      margin-left: 5px;
      cursor: pointer;
    }

    li {
      margin: 10px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .completed span {
      text-decoration: line-through;
      color: gray;
    }

    .filters {
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h2>Todo App</h2>

  <input type="text" id="taskInput" placeholder="Enter task">
  <button id="addBtn">Add</button>

  <ul id="todoList"></ul>

  <p id="taskCount">0 tasks left</p>

  <div class="filters">
    <button data-filter="all">All</button>
    <button data-filter="active">Active</button>
    <button data-filter="completed">Completed</button>
  </div>

  <script src="script.js"></script>

</body>
</html>
