<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Analytics Dashboard</title>

<style>
  * {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    margin: 0;
    background: #f5f6fa;
  }

  header {
    background: #1f2937;
    color: white;
    padding: 15px 20px;
    font-size: 18px;
  }

  .container {
    padding: 20px;
  }

  /* KPI GRID */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-bottom: 20px;
  }

  .kpi-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .kpi-title {
    font-size: 13px;
    color: #6b7280;
  }

  .kpi-value {
    font-size: 22px;
    font-weight: bold;
    margin-top: 5px;
  }

  /* TABLE SECTION */
  .table-container {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
  }

  th, td {
    text-align: left;
    padding: 12px;
    border-bottom: 1px solid #eee;
  }

  th {
    background: #f9fafb;
    color: #374151;
  }

  .status {
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    display: inline-block;
  }

  .success {
    background: #dcfce7;
    color: #166534;
  }

  .pending {
    background: #fef3c7;
    color: #92400e;
  }

  .failed {
    background: #fee2e2;
    color: #991b1b;
  }

  /* RESPONSIVE BREAKPOINTS */
  @media (max-width: 1024px) {
    .kpi-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 600px) {
    .kpi-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>

<header>
  Analytics Dashboard
</header>

<div class="container">

  <!-- KPI CARDS -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-title">Total Users</div>
      <div class="kpi-value">12,450</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-title">Revenue</div>
      <div class="kpi-value">$89,320</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-title">Orders</div>
      <div class="kpi-value">3,210</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-title">Conversion Rate</div>
      <div class="kpi-value">4.8%</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="tableBody">
        <!-- JS inserts rows -->
      </tbody>
    </table>
  </div>

</div>

<script>
  const data = [
    { id: "#1001", customer: "Aman", amount: "$120", status: "success" },
    { id: "#1002", customer: "Riya", amount: "$89", status: "pending" },
    { id: "#1003", customer: "John", amount: "$240", status: "failed" },
    { id: "#1004", customer: "Sara", amount: "$310", status: "success" },
    { id: "#1005", customer: "Mike", amount: "$150", status: "pending" }
  ];

  const tableBody = document.getElementById("tableBody");

  data.forEach(item => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${item.id}</td>
      <td>${item.customer}</td>
      <td>${item.amount}</td>
      <td>
        <span class="status ${item.status}">
          ${item.status}
        </span>
      </td>
    `;

    tableBody.appendChild(row);
  });
</script>

</body>
</html>
